      border: none;
      font-family: inherit;
      transition: transform 0.15s ease, opacity 0.15s ease;

      transform: translateX(4px);

    .choice-btn:active {

    /* ============================================================
       DEAD-END SCREENS
    ============================================================ */
    .deadend-footer {

    .deadend-progress-track {

    /* ============================================================

    /* ============================================================
       FINAL SCREEN ELEMENTS
    ============================================================ */
    .final-line {
      font-size: 1.05rem;
      font-style: italic;
      line-height: 1.7;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid;
    }

    .final-actions {

      align-items: center;

    .share-btn {

    }

    .restart-btn {

      letter-spacing: 0.12em;

      border: none;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;

    }

    .restart-btn:hover {
      opacity: 0.7;
    }

    .provenance-line {
      margin-top: 1.5rem;
      font-size: 0.68rem;

      font-family: system-ui, -apple-system, sans-serif;

    /* ============================================================
       ACT I — THE FIELD: Warm amber, sepia, parchment
    ============================================================ */
    .act-1 {
      background-color: #f2deb4;

    .act-1 .act-badge { color: #5c3d20; }

    .act-1 .share-btn { background: #2b1a0e; color: #f2deb4; }
    .act-1 .restart-btn { color: #2b1a0e; }
    .act-1 .provenance-line { color: #2b1a0e; }

    /* ============================================================
       ACT II — THE PLATFORM: Cold, dark, terminal
    ============================================================ */
    .act-2 {
      background-color: #0a0a0a;
      color: #c2ccd6;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    .act-2 .act-badge { color: #2a4555; }
    .act-2 .chapter-eyebrow { color: #2a4555; }

    .act-2 .deadend-progress-track { background: rgba(194, 204, 214, 0.1); }

<script>
// ============================================================
// CHAPTER DEFINITIONS
// ============================================================

const CHAPTERS = {

  ch1: {
    id: 'ch1',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'ARRIVAL',
    render: () => `
      <div class="penny-quote">
        "From unpaid agricultural workers who yielded cotton for farmers to unpaid site users who yield content for platformers."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <p>You have arrived. You didn't choose to be here. The land belongs to someone else. The crop belongs to someone else. What you produce today will build a fortune — just not yours.</p>
      </div>
    `,
    choices: [
      { text: 'Work the row.', next: 'ch2' },
      { text: 'Look for the way out.', next: 'ch1a' }
    ]
  },

  ch1a: {
    id: 'ch1a',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'THE FENCE',
    deadEnd: true,
    deadEndReturn: 'ch1',
    render: () => `
      <div class="chapter-body">
        <p>The fence is real. The gate is locked. The exit requires something you don't yet have. Come back when you know what it is.</p>
      </div>
    `
  },

  ch2: {
    id: 'ch2',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'THE HARVEST',
    render: () => `
      <div class="penny-quote">
        "Getting things done cheaply in a way that benefits you and actively burdens another."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <p>Your labor produces $47 in value today. You receive nothing. The farmer calls this "the system." You call it by another name.</p>
      </div>
      <div class="lesson-box">
        <span class="lesson-label">Lesson</span>
        The cotton economy ran on what economists call "externalizing costs" — meaning, someone else pays. In this case: you.
      </div>
    `,
    choices: [
      { text: 'Keep working. It\'s what everyone does.', next: 'ch3' },
      { text: 'Ask why.', next: 'ch2a' }
    ]
  },

  ch2a: {
    id: 'ch2a',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'THE ANSWER',
    deadEnd: true,
    deadEndReturn: 'ch3',
    render: () => `
      <div class="chapter-body">
        <p>There is no one here who will answer. The people who built this system are not in the field. They are in the house.</p>
      </div>
    `
  },

  ch3: {
    id: 'ch3',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'THE COTTON GIN',
    render: () => `
      <div class="penny-quote">
        "AI is the cotton gin of writing, however, in the same way that we don't even remember the commercials of 'the touch the field of cotton is the fabric of our lives' we also won't understand the price of content."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <p>A machine arrives. The field is still full. The machine is faster.</p>
        <p>A machine now does part of your work. The owner keeps the efficiency gains. Your labor becomes less visible — which means less valued. Which means easier to deny.</p>
      </div>
      <div class="lesson-box">
        <span class="lesson-label">Lesson</span>
        Each labor revolution — cotton gin, industrial loom, AI content generator — reduces the visibility of the human worker while increasing the owner's profit. Invisibility is the mechanism.
      </div>
    `,
    choices: [
      { text: 'The machine changes nothing. I\'m still here.', next: 'ch4' },
      { text: 'Maybe now I\'m free.', next: 'ch3a' }
    ]
  },

  ch3a: {
    id: 'ch3a',
    act: 'ACT I',
    actClass: 'act-1',
    title: 'THE ILLUSION',
    deadEnd: true,
    deadEndReturn: 'ch4',
    render: () => `
      <div class="chapter-body">
        <p>The machine freed the owner from needing you in the field. It did not free you from needing to work. Freedom of movement is not freedom from extraction. You will find the same system waiting in a different building.</p>
      </div>
    `
  },

  ch4: {
    id: 'ch4',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'THE FEED',
    render: () => `
      <div class="penny-quote">
        "The American populous itself is the most valuable resource in this country. That's why the American constitution starts that way."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <p>Welcome. You are free to post here. It costs nothing. This is a gift — a public square, they say. But notice: what you post here becomes theirs. Your attention is the product being sold. Your creativity is the inventory.</p>
      </div>
      <div class="lesson-box">
        <span class="lesson-label">Lesson</span>
        Section 230 of the Communications Decency Act shields platforms from the editorial responsibilities that publishers face — while platforms profit from publishing. This is the legal mechanism of free labor in the digital age.
      </div>
    `,
    choices: [
      { text: 'Post something.', next: 'ch5' },
      { text: 'Wait. Whose platform is this?', next: 'ch4a' }
    ]
  },

  ch4a: {
    id: 'ch4a',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'ICANN',
    deadEnd: true,
    deadEndReturn: 'ch5',
    render: () => `
      <div class="penny-quote">
        "ICANN is like the United Nations of our digital environment, which we now really think of as synonymous with our real environment, yet we have no idea about the political infrastructure of our digital world."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <p>You lease your domain. You lease your audience. You lease your presence. You thought you owned something here. You rented it.</p>
      </div>
    `
  },

  ch5: {
    id: 'ch5',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'THE VALUE',
    render: () => `
      <div class="penny-quote">
        "The entire tech economy, content economy, influencer economy has been built on the backs of users — unpaid users and user generated content."
        <span class="attribution">— Penny Wrenn</span>
      </div>
      <div class="chapter-body">
        <div class="data-terminal">
          IMPRESSIONS GENERATED&nbsp;&nbsp;&nbsp;12,000<br>
          PLATFORM AD REVENUE&nbsp;&nbsp;&nbsp;&nbsp;$340.00<br>
          YOUR SHARE&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="data-zero">$0.00</span><span class="blink-cursor"></span>
        </div>
        <p>This is not a mistake. This is the business model.</p>
      </div>
      <div class="lesson-box">
        <span class="lesson-label">Lesson</span>
        "Content moderators... are not the same as editors. They are trying not to do what actually is the best practice when it comes to media, and doing that as a willfully negligent approach to keep them from liability." — Penny Wrenn
      </div>
    `,
    choices: [
      { text: 'Keep posting. Everyone does.', next: 'ch6' },
      { text: 'Delete it. Take it back.', next: 'ch5a' }
    ]
  },

  ch5a: {
    id: 'ch5a',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'THE LOSS',
    deadEnd: true,
    deadEndReturn: 'ch6',
    render: () => `
      <div class="chapter-body">
        <p>You delete your post. But the data was already harvested. The model was already trained on it. The impressions were already sold. You cannot take back what has already been extracted.</p>
        <p>You can stop giving more. But yesterday's labor is gone.</p>
      </div>
    `
  },

  ch6: {
    id: 'ch6',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'THE SHUTDOWN',
    render: () => `
      <div class="penny-quote">
        "That's the whole point of 'from cotton to content.' It's the value of 'We the People.'"
        <span class="attribution">— Penny Wrenn, January 21, 2025</span>
      </div>
      <div class="chapter-body">
        <p>January 2025. TikTok goes dark for American users.</p>
        <p>When American users disappeared, the platform went dark. Not for them — <em>because of them.</em> This is the empirical proof. You are not the audience. You are the engine.</p>
      </div>
      <div class="lesson-box">
        <span class="lesson-label">Lesson</span>
        The TikTok shutdown moment is the argument made visible: when "We the People" stop laboring for the platform, the platform stops.
      </div>
    `,
    choices: [
      { text: 'I see it now. What do I do?', next: 'ch7' },
      { text: 'It came back. Nothing changed.', next: 'ch6a' }
    ]
  },

  ch6a: {
    id: 'ch6a',
    act: 'ACT II',
    actClass: 'act-2',
    title: 'THE RETURN',
    deadEnd: true,
    deadEndReturn: 'ch7',
    render: () => `
      <div class="chapter-body">
        <p>Yes. It came back. Because the labor was too valuable to lose. Which proves the point.</p>
      </div>
    `
  },

  ch7: {
    id: 'ch7',
    act: 'ACT III',
    actClass: 'act-3',

// ============================================================
// NAVIGATION ENGINE
// ============================================================

let deadEndTimer = null;

function showChapter(id) {
  if (deadEndTimer) {
    clearTimeout(deadEndTimer);
    deadEndTimer = null;
  }

  const chapter = CHAPTERS[id];
  if (!chapter) {
    console.error('Chapter not found:', id);
    return;
  }

  const app = document.getElementById('app');
  const existing = app.querySelector('.chapter.active');

  const html = buildChapterHTML(chapter);

  function mountChapter() {
    app.innerHTML = html;
    window.scrollTo(0, 0);

    const el = app.querySelector('.chapter');
    el.classList.add('active');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.classList.add('visible');
      });
    });

    bindEvents(chapter);
  }

  if (existing) {
    existing.classList.remove('visible');
    setTimeout(mountChapter, 310);
  } else {
    mountChapter();
  }
}

function buildChapterHTML(chapter) {
  const body = chapter.render();
  const footer = buildFooter(chapter);

  return `
    <div class="chapter ${chapter.actClass}" id="screen-${chapter.id}" role="main">
      <div class="act-badge">${chapter.act}</div>
      <div class="chapter-inner">
        <div class="chapter-eyebrow">${chapter.title}</div>
        ${body}
        ${footer}
      </div>
    </div>
  `;
}

function buildFooter(chapter) {
  if (chapter.isFinal) {
    return `
      <div class="final-actions">
        <button class="share-btn" id="js-share">Share this</button>
        <button class="restart-btn" id="js-restart">Start over</button>
      </div>
      <div class="provenance-line">
        Coined: 2022 &nbsp;|&nbsp; Claimed: February 24, 2025 &nbsp;|&nbsp; &copy; Penny Wrenn &nbsp;|&nbsp; PW-C2C-2022-ORIGIN
      </div>
    `;
  }

  if (chapter.deadEnd) {
    return `
      <div class="deadend-footer">
        <div class="deadend-progress-track">
          <div class="deadend-progress-fill" id="js-progress"></div>
        </div>
        <button class="deadend-skip" id="js-skip">Continue</button>
      </div>
    `;
  }

  if (chapter.choices && chapter.choices.length) {
    const buttons = chapter.choices
      .map(c => `<button class="choice-btn" data-next="${c.next}">${c.text}</button>`)
      .join('');
    return `<div class="choices">${buttons}</div>`;
  }

  return '';
}

function bindEvents(chapter) {
  // Choice buttons
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const next = btn.getAttribute('data-next');
      if (next) showChapter(next);
    });
  });

  // Dead-end auto-advance
  if (chapter.deadEnd && chapter.deadEndReturn) {
    const fill = document.getElementById('js-progress');
    const skip = document.getElementById('js-skip');
    const dest = chapter.deadEndReturn;
    const advance = () => showChapter(dest);

    if (fill) {
      // Trigger CSS transition on next paint
      requestAnimationFrame(() => {
        fill.style.transition = 'width 4.5s linear';
        fill.style.width = '100%';
      });
    }

    deadEndTimer = setTimeout(advance, 4500);

    if (skip) {
      skip.addEventListener('click', () => {
        if (deadEndTimer) { clearTimeout(deadEndTimer); deadEndTimer = null; }
        advance();
      });
    }
  }

  // Final screen: share
  const shareBtn = document.getElementById('js-share');
  if (shareBtn) {
    shareBtn.addEventListener('click', () => {
      const url = 'https://pennywrenn.media/cotton-to-content';
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url)
          .then(() => toast('URL copied to clipboard'))
          .catch(() => fallbackCopy(url));
      } else {
        fallbackCopy(url);
      }
    });
  }

  // Final screen: restart
  const restartBtn = document.getElementById('js-restart');
  if (restartBtn) {
    restartBtn.addEventListener('click', () => showChapter('ch1'));
  }
}

function fallbackCopy(text) {
  try {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.focus();
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('URL copied to clipboard');
  } catch (e) {
    toast('Copy: https://pennywrenn.media/cotton-to-content');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================

showChapter('ch1');
